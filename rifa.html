<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Rifa - Good Vibes Reset</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #1a0a3e; color: #fff; min-height: 100vh; }
.header { background: linear-gradient(135deg, #4A1B8C, #7B2FBE); padding: 20px 16px; text-align: center; }
.header h1 { font-size: 24px; color: #fff; }
.header p { font-size: 13px; color: #C9A8F0; margin-top: 4px; }
.container { padding: 16px; max-width: 560px; margin: auto; }
.panel { background: #2a1060; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.panel h3 { font-size: 14px; color: #C9A8F0; margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
.input-group { margin-bottom: 12px; }
label { font-size: 12px; color: #C9A8F0; display: block; margin-bottom: 6px; }
input[type=text], input[type=number], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4A1B8C; background: #1a0a3e; color: #fff; font-size: 14px; }
input[type=text]::placeholder, input[type=number]::placeholder { color: #555; }
select option { background: #1a0a3e; }
.filtros { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-cargar { background: #4A1B8C; color: #fff; }
.btn-rifar { background: linear-gradient(135deg, #E8317A, #F4872A); color: #fff; font-size: 20px; padding: 22px; }
.btn-correo { background: #1B7B6E; color: #fff; }
.btn-otro { background: #856404; color: #fff; }
.btn-nuevo { background: #3a2060; border: 1px solid #4A1B8C; color: #fff; }
.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat { flex: 1; background: #1a0a3e; border-radius: 10px; padding: 12px 8px; text-align: center; }
.stat-num { font-size: 26px; font-weight: bold; }
.stat-label { font-size: 10px; color: #C9A8F0; margin-top: 2px; }
.stat-pool { background: #4A1B8C; }
.stat-rifas { background: #856404; }
.stat-ganados { background: #1B7B6E; }

/* Ruleta */
.rolling { display: none; text-align: center; padding: 40px 20px; }
.rolling.visible { display: block; }
.rolling-label { font-size: 13px; color: #C9A8F0; margin-bottom: 16px; }
.rolling-name { font-size: 26px; font-weight: bold; color: #E8317A; min-height: 40px; animation: flicker 0.08s infinite; }
@keyframes flicker { 0%{opacity:1} 50%{opacity:0.2} 100%{opacity:1} }

/* Ganador */
.winner-box { display: none; text-align: center; padding: 20px; }
.winner-box.visible { display: block; }
.confetti { font-size: 50px; margin-bottom: 12px; animation: spin 1s infinite linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.winner-name { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 6px; line-height: 1.3; }
.winner-tipo { font-size: 13px; color: #C9A8F0; margin-bottom: 6px; }
.winner-metodo { font-size: 12px; color: #856404; margin-bottom: 16px; }
.winner-premio { font-size: 18px; font-weight: bold; color: #F4872A; padding: 10px 20px; background: #1a0a3e; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.winner-sponsor { font-size: 12px; color: #C9A8F0; margin-bottom: 20px; }

/* Lista ganadores */
.ganadores-list { list-style: none; }
.ganadores-list li { padding: 10px 0; border-bottom: 1px solid #3a2060; }
.ganadores-list li:last-child { border-bottom: none; }
.g-nombre { font-size: 14px; font-weight: bold; color: #fff; }
.g-premio { font-size: 12px; color: #F4872A; margin-top: 2px; }
.g-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; }
.badge-ok { background: #1B7B6E; color: #fff; }
.badge-pend { background: #856404; color: #fff; }

.loading { text-align: center; padding: 20px; color: #C9A8F0; font-size: 14px; }
.error-msg { color: #E8317A; font-size: 13px; text-align: center; padding: 8px; }
.exito-msg { background: #1B7B6E; color: #fff; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; margin-bottom: 8px; }
.pool-info { font-size: 12px; color: #C9A8F0; text-align: center; margin-top: 8px; }

.screen { display: none; }
.screen.active { display: block; }
.divider { height: 1px; background: #3a2060; margin: 12px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🎉 Rifa Good Vibes Reset</h1>
  <p>Sistema de sorteo para el evento</p>
</div>

<div class="container">

  <!-- PANTALLA 1: Configurar -->
  <div id="screen-config" class="screen active">
    <div class="panel">
      <h3>Configurar rifa</h3>
      <div class="input-group">
        <label>Patrocinador (opcional)</label>
        <input type="text" id="sponsor-input" placeholder="Ej: Yoga Studio Panama">
      </div>
      <div class="divider"></div>
      <h3 style="margin-bottom:14px;">Filtros del pool</h3>
      <div class="filtros">
        <div class="input-group">
          <label>Metodo de pago</label>
          <select id="filtro-metodo">
            <option value="">Todos</option>
            <option value="Yappy">Yappy</option>
            <option value="Tarjeta">Tarjeta Debito/Credito</option>
            <option value="Transferencia">Transferencia Bancaria</option>
          </select>
        </div>
        <div class="input-group">
          <label>Tipo de entrada</label>
          <select id="filtro-tipo">
            <option value="">Todos</option>
            <option value="Kit">Con Kit</option>
            <option value="sin Kit">Sin Kit</option>
          </select>
        </div>
      </div>
      <button class="btn btn-cargar" onclick="cargarParticipantes()">
        Cargar participantes desde Sheets
      </button>
      <div id="config-status" style="margin-top:12px;"></div>
    </div>
  </div>

  <!-- PANTALLA 2: Rifa -->
  <div id="screen-rifa" class="screen">

    <div class="stats">
      <div class="stat stat-pool">
        <div class="stat-num" id="pool-count">0</div>
        <div class="stat-label">En el pool</div>
      </div>
      <div class="stat stat-rifas">
        <div class="stat-num" id="rifas-count">0</div>
        <div class="stat-label">Rifas</div>
      </div>
      <div class="stat stat-ganados">
        <div class="stat-num" id="ganados-count">0</div>
        <div class="stat-label">Ganadores</div>
      </div>
    </div>

    <div class="panel">
      <h3>Premio de esta rifa</h3>
      <div class="input-group">
        <label>Nombre del premio</label>
        <input type="text" id="premio-input" placeholder="Ej: Membresía de yoga 1 mes">
      </div>
      <div class="rolling" id="rolling">
        <div class="rolling-label">Sorteando...</div>
        <div class="rolling-name" id="rolling-name">---</div>
      </div>
      <div class="winner-box" id="winner-box">
        <div class="confetti">🎊</div>
        <div class="winner-name" id="winner-name"></div>
        <div class="winner-tipo" id="winner-tipo"></div>
        <div class="winner-metodo" id="winner-metodo"></div>
        <div class="winner-premio" id="winner-premio"></div>
        <div class="winner-sponsor" id="winner-sponsor"></div>
        <div id="correo-status" style="margin-bottom:8px;"></div>
        <button class="btn btn-correo" id="btn-correo" onclick="enviarCorreo()">
          Enviar correo al ganador
        </button>
        <button class="btn btn-otro" style="margin-top:8px;" onclick="otroGanador()">
          No esta presente — sortear otro
        </button>
        <button class="btn btn-nuevo" style="margin-top:8px;" onclick="nuevaRifa()">
          Nueva rifa (otro premio)
        </button>
      </div>
      <button class="btn btn-rifar" id="btn-rifar" onclick="iniciarRifa()">
        SORTEAR GANADOR
      </button>
      <p class="pool-info" id="pool-info"></p>
    </div>

    <div class="panel" id="panel-ganadores" style="display:none;">
      <h3>Ganadores de esta sesion</h3>
      <ul class="ganadores-list" id="ganadores-list"></ul>
    </div>

    <button class="btn btn-nuevo" onclick="volverConfig()" style="margin-bottom:20px;">
      Cambiar filtros
    </button>

  </div>

</div>

<script>
var BASE_URL = "https://script.google.com/macros/s/AKfycbzZmPcYBe6MEI-nFZ7T-Qheg6QU1RKFQOU0yHG4elB82MEuUYOFIOB3dEVnuPNd5hileA/exec";
var todosParticipantes = [];
var poolActual = [];
var ganadores = [];
var ganadorActual = null;
var rifando = false;

function cargarParticipantes() {
  var status = document.getElementById("config-status");
  status.innerHTML = "<div class='loading'>Cargando desde Google Sheets...</div>";
  var script = document.createElement("script");
  script.src = BASE_URL + "?action=ingresados&callback=recibirParticipantes";
  script.onerror = function() {
    status.innerHTML = "<p class='error-msg'>Error de conexion. Verifica internet.</p>";
  };
  document.head.appendChild(script);
  setTimeout(function() {
    if (todosParticipantes.length === 0 && status.innerHTML.indexOf("Cargando") >= 0) {
      status.innerHTML = "<p class='error-msg'>Tiempo agotado. Intenta de nuevo.</p>";
    }
  }, 15000);
}

function recibirParticipantes(data) {
  if (!data || !data.participantes) {
    document.getElementById("config-status").innerHTML =
      "<p class='error-msg'>Error al cargar. Intenta de nuevo.</p>";
    return;
  }
  todosParticipantes = data.participantes;
  aplicarFiltros();
}

function aplicarFiltros() {
  var filtroMetodo = document.getElementById("filtro-metodo").value;
  var filtroTipo   = document.getElementById("filtro-tipo").value;

  poolActual = todosParticipantes.filter(function(p) {
    var pasaMetodo = !filtroMetodo || p.metodo.indexOf(filtroMetodo) >= 0;
    var pasaTipo   = !filtroTipo   || p.tipo.indexOf(filtroTipo)   >= 0;
    return pasaMetodo && pasaTipo;
  });

  if (poolActual.length === 0) {
    document.getElementById("config-status").innerHTML =
      "<p class='error-msg'>No hay participantes con esos filtros. Cambia los filtros e intenta.</p>";
    return;
  }

  actualizarStats();
  document.getElementById("screen-config").className = "screen";
  document.getElementById("screen-rifa").className = "screen active";
  actualizarPoolInfo();
}

function actualizarPoolInfo() {
  var filtroMetodo = document.getElementById("filtro-metodo").value || "Todos";
  var filtroTipo   = document.getElementById("filtro-tipo").value   || "Todos";
  var sponsor      = document.getElementById("sponsor-input").value;
  var info = "Pool: " + poolActual.length + " personas | Pago: " + filtroMetodo + " | Entrada: " + filtroTipo;
  if (sponsor) info += " | Sponsor: " + sponsor;
  document.getElementById("pool-info").textContent = info;
}

function actualizarStats() {
  document.getElementById("pool-count").textContent    = poolActual.length;
  document.getElementById("rifas-count").textContent   = ganadores.length;
  document.getElementById("ganados-count").textContent = ganadores.filter(function(g){ return g.confirmado; }).length;
}

function iniciarRifa() {
  if (rifando || poolActual.length === 0) return;
  var premio = document.getElementById("premio-input").value.trim();
  if (!premio) {
    alert("Escribe el nombre del premio antes de sortear.");
    document.getElementById("premio-input").focus();
    return;
  }
  rifando = true;
  document.getElementById("btn-rifar").disabled = true;
  document.getElementById("winner-box").className = "winner-box";
  document.getElementById("rolling").className = "rolling visible";
  document.getElementById("correo-status").innerHTML = "";

  var contador = 0;
  var duracion = 3000;
  var intervalo = 80;
  var rollingName = document.getElementById("rolling-name");

  var timer = setInterval(function() {
    var idx = Math.floor(Math.random() * poolActual.length);
    rollingName.textContent = poolActual[idx].nombre;
    contador += intervalo;
    if (contador >= duracion) {
      clearInterval(timer);
      var ganador = poolActual[Math.floor(Math.random() * poolActual.length)];
      var sponsor = document.getElementById("sponsor-input").value.trim();
      ganadorActual = {
        participante: ganador,
        premio: premio,
        sponsor: sponsor,
        confirmado: false,
        correoEnviado: false
      };
      mostrarGanador();
    }
  }, intervalo);
}

function mostrarGanador() {
  document.getElementById("rolling").className = "rolling";
  var g = ganadorActual.participante;
  document.getElementById("winner-name").textContent = g.nombre;
  document.getElementById("winner-tipo").textContent = g.tipo;
  document.getElementById("winner-metodo").textContent = "Pago: " + g.metodo;
  document.getElementById("winner-premio").textContent = ganadorActual.premio;
  document.getElementById("winner-sponsor").textContent = ganadorActual.sponsor ? "Patrocinado por: " + ganadorActual.sponsor : "";
  document.getElementById("btn-correo").disabled = false;
  document.getElementById("btn-correo").textContent = "Enviar correo al ganador";
  document.getElementById("btn-correo").style.background = "#1B7B6E";
  document.getElementById("winner-box").className = "winner-box visible";
}

function enviarCorreo() {
  if (!ganadorActual) return;
  var btn = document.getElementById("btn-correo");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  var script = document.createElement("script");
  var cbName = "cb_correo_" + Date.now();
  script.src = BASE_URL
    + "?action=notificar"
    + "&sid="     + encodeURIComponent(ganadorActual.participante.sid)
    + "&premio="  + encodeURIComponent(ganadorActual.premio)
    + "&sponsor=" + encodeURIComponent(ganadorActual.sponsor || "")
    + "&callback=" + cbName;

  window[cbName] = function(data) {
    if (data && data.success) {
      ganadorActual.correoEnviado = true;
      btn.textContent = "Correo enviado";
      btn.style.background = "#1B7B6E";
      document.getElementById("correo-status").innerHTML =
        "<div class='exito-msg'>Correo enviado a " + ganadorActual.participante.email + "</div>";
      confirmarGanador();
    } else {
      btn.disabled = false;
      btn.textContent = "Error — Intentar de nuevo";
    }
  };

  document.head.appendChild(script);

  setTimeout(function() {
    if (!ganadorActual || !ganadorActual.correoEnviado) {
      btn.disabled = false;
      btn.textContent = "Error de conexion — Intentar";
    }
  }, 12000);
}

function confirmarGanador() {
  poolActual = poolActual.filter(function(p) {
    return p.sid !== ganadorActual.participante.sid;
  });
  ganadorActual.confirmado = true;
  ganadores.push(ganadorActual);
  actualizarStats();
  actualizarListaGanadores();
}

function otroGanador() {
  rifando = false;
  ganadorActual = null;
  document.getElementById("winner-box").className = "winner-box";
  document.getElementById("btn-rifar").disabled = false;
}

function nuevaRifa() {
  if (ganadorActual && !ganadorActual.confirmado) {
    confirmarGanador();
  }
  rifando = false;
  ganadorActual = null;
  document.getElementById("winner-box").className = "winner-box";
  document.getElementById("btn-rifar").disabled = false;
  document.getElementById("premio-input").value = "";
  document.getElementById("correo-status").innerHTML = "";
  document.getElementById("premio-input").focus();
}

function volverConfig() {
  document.getElementById("screen-rifa").className = "screen";
  document.getElementById("screen-config").className = "screen active";
  document.getElementById("config-status").innerHTML = "";
  rifando = false;
  ganadorActual = null;
}

function actualizarListaGanadores() {
  var panel = document.getElementById("panel-ganadores");
  var lista  = document.getElementById("ganadores-list");
  if (ganadores.length === 0) { panel.style.display = "none"; return; }
  panel.style.display = "block";
  lista.innerHTML = ganadores.map(function(g, i) {
    var badge = g.correoEnviado
      ? "<span class='g-badge badge-ok'>Correo enviado</span>"
      : "<span class='g-badge badge-pend'>Sin correo</span>";
    return "<li>"
      + "<div class='g-nombre'>" + (i+1) + ". " + g.participante.nombre + "</div>"
      + "<div class='g-premio'>" + g.premio + (g.sponsor ? " — " + g.sponsor : "") + "</div>"
      + badge + "</li>";
  }).join("");
}
</script>
</body>
</html>
